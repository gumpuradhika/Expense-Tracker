<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
  <body>

    <div class="header">
        <p class-"m-0">Expense <br>Tracker
            <img src="./tracker.jpg" alt="" width="45px" >

        </p>
    </div>
      <div class="input-form" >

       <div class="form-floating" inputs>
  <input type="email" class="form-control" id="floatingInput" placeholder="Email address">
  <label for="floatingInput">Amout</label>
</div>
<select class="form-select" inputs aria-label="Default select example">
  <option selected>Transaction Type</option>
  <option value="Income">Income</option>
  <option value="Expense">Expense</option>
  
</select>

<div class="form-floating " inputs>
  <input type="Date" class="form-control" id="floatingInput" placeholder="Email address">
  <label for="floatingInput">Date</label>
</div>

      
      <button class="btn" id="add-button">+</button>
</div>
<div class="cards mt-4">
  <div class="card" style="width: 18rem;">
     <div class="card-body">
         <h5 class="card-title m-0">Total Income
         <img src="./wal.png" alt="" width="30px">
         </h5>
         <h1 class="m-0">
          ₹
         <span id="totalIncome" class="m-0">10,499</span>
         </h1>
      
     </div>
  </div>
         <div class="card" style="width: 18rem;">
     <div class="card-body">
         <h5 class="card-title m-0">Total Expense
         <img src="./expen.png" alt=" " width= "35px">
         </h5>
         <h1 class="m-0">
        ₹
         <span id="totalExpense" class="m-0">5,499</span>
         </h1>

     </div>
     </div>
      <div class="card" style="width: 18rem;">
     <div class="card-body">
         <h5 class="card-title m-0">Balance
         <img src="./balance.jpg" alt="" width="30px">
         </h5>
         <h1 class="m-0">
         ₹
         <span id="balance" class="m-0">5,499</span>
         </h1>

     </div>
   
</div>
</div>
<table class="transaction-table" mt-3>
  <tr id="header-row">
    <th>Amount</th>
    <th>Transaction Type</th>
    <th>Transaction Date</th>
    <th>Action</th>
  </tr>
  
    <tr>
        <td>10,499</td>
        <td>income</td>
        <td>24-6-2026</td>
        <td><button class="btn btn-sm delete-button">
          <img src="./recycle.png" alt="" width="35px">
        </button></td>
    </tr>
     <tr>
        <td>10,000</td>
        <td>income</td>
        <td>24-6-2026</td>
        <td><button class="btn btn-sm delete-button">
          <img src="./recycle.png" alt="" width="35px">
        </button></td>
    </tr>
     <tr>
        <td>2,499</td>
        <td>expense</td>
        <td>24-6-2026</td>
        <td><button class="btn btn-sm delete-button">
          <img src="./recycle.png" alt="" width="35px">
        </button></td>
        <tr>
        <td>2,000</td>
        <td>expense</td>
        <td>24-6-2026</td>
        <td><button class="btn btn-sm delete-button">
          <img src="./recycle.png" alt="" width="35px">
        </button></td>
</table>
